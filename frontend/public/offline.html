<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morsel — Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #0a0e27;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -0.03em;
        }
        p {
            color: #8a8a8a;
            max-width: 300px;
            line-height: 1.5;
            font-weight: 500;
        }
        .retry-btn {
            margin-top: 30px;
            background-color: #d4ff00;
            color: #0a0e27;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212,255,0,0.3);
        }
    </style>
</head>
<body>
    <div class="icon">🛰️</div>
    <h1>You're Offline</h1>
    <p>Morsel needs a connection to sync your fuel. Check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry Sync</button>
</body>
</html>
